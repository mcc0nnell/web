name: Patch emergency page

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-emergency-page.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update emergency page
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('public/emergency/index.html')
          html = path.read_text(encoding='utf-8')

          html = html.replace('overflow-wrap:anywhere;word-break:normal;hyphens:auto', 'overflow-wrap:break-word;word-break:normal;-webkit-hyphens:none;hyphens:none')
          html = html.replace('data-txt="brunson (2011) video relay service interpreters deaf vrs users perform substantial invisible labor to make an accommodation actually function."', 'data-txt="brunson (2011) the invisible labor of video relay service access deaf vrs users perform substantial invisible labor to make an accommodation actually function."')
          html = html.replace('<h3>Video Relay Service Interpreters</h3>', '<h3>The Invisible Labor of Video Relay Service Access</h3>')

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit patch and remove one-time workflow
        run: |
          rm .github/workflows/patch-emergency-page.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/emergency/index.html .github/workflows/patch-emergency-page.yml
          git commit -m "Polish emergency page typography and Brunson title"
          git push
