name: Expand EIABI source corpus

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-emergency-sources.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update emergency source corpus
        run: python scripts/update_emergency_sources.py

      - name: Commit expansion and remove one-time updater
        run: |
          rm .github/workflows/update-emergency-sources.yml scripts/update_emergency_sources.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/emergency/index.html .github/workflows/update-emergency-sources.yml scripts/update_emergency_sources.py
          git commit -m "Expand EIABI corpus to 36 verified sources"
          git push
