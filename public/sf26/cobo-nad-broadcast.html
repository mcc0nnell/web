<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CoBo Live — NAD Broadcast Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050f22;--bg2:#081833;--panel:#0d2245;--panel-soft:#102a53;--card:#0b1f3f;--card2:#132f5a;--electric:#f2a800;--gold:#f2a800;--fire:#d44d27;--green:#25c46a;--white:#ffffff;--off:rgba(255,255,255,.88);--dim:rgba(255,255,255,.62);--muted:rgba(242,168,0,.52);--line:rgba(242,168,0,.18);--line-soft:rgba(255,255,255,.1);--fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(120% 130% at 50% -20%,#12305f 0%,var(--bg2) 35%,var(--bg) 72%);color:var(--white);font-family:var(--fb);min-height:100vh}
button{cursor:pointer;font-family:var(--fb);border:none}input,textarea,select{font-family:var(--fb)}

.topbar{position:fixed;top:0;left:0;right:0;z-index:999;height:62px;background:linear-gradient(180deg,rgba(242,168,0,.98),rgba(226,153,0,.96));border-bottom:1px solid rgba(255,255,255,.25);display:flex;align-items:center;padding:0 14px;gap:8px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.topbar:after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,rgba(5,15,34,.4),transparent)}
.topbar .logo{display:flex;align-items:center;gap:10px;font-family:var(--fd);font-size:28px;color:var(--panel);letter-spacing:4px;font-weight:800;margin-right:10px;line-height:1}
.topbar .logo img{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.2))}
.tbtn{padding:8px 12px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.14em;background:transparent;color:rgba(11,30,61,.7);transition:all .18s ease;text-transform:uppercase}
.tbtn:hover{color:var(--panel);background:rgba(255,255,255,.2)}
.tbtn.on{background:var(--panel);color:var(--white);box-shadow:0 4px 16px rgba(5,15,34,.35)}
.topbar .tphase{margin-left:auto;font-family:var(--fb);font-size:10px;color:rgba(11,30,61,.62);letter-spacing:.18em;text-transform:uppercase}.topbar .tphase b{color:var(--panel);font-size:12px}

.v{display:none;padding-top:62px;min-height:100vh}.v.on{display:block}

.fox-scores{display:flex;background:linear-gradient(180deg,#10274d,#0b1f3f);border-top:3px solid var(--gold);border-bottom:1px solid var(--line);box-shadow:0 14px 30px rgba(0,0,0,.28)}
.ft{flex:1;display:flex;align-items:center;padding:12px 16px;gap:10px;border-right:1px solid var(--line);min-height:64px}
.ft:last-child{border-right:none}.ft-color{width:5px;height:34px;border-radius:3px;flex-shrink:0}
.ft-name{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--white);letter-spacing:.08em}
.ft-score{font-family:var(--fm);font-size:28px;font-weight:700;color:var(--white);margin-left:auto;line-height:1}
.ft-chal{font-size:12px;color:var(--gold);font-family:var(--fm);font-weight:700;animation:heartbeat 1s infinite}
.ft-rnd{padding:10px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(242,168,0,.18),rgba(242,168,0,.08));border-right:1px solid var(--line);min-width:78px}
.ft-rnd-l{font-family:var(--fm);font-size:9px;color:var(--dim);letter-spacing:.24em}
.ft-rnd-v{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--white);letter-spacing:.04em}

.fox-tmr{background:rgba(7,21,46,.84);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:12px}
.fox-tmr-n{font-family:var(--fm);font-size:30px;font-weight:700;color:var(--white);width:48px;text-align:center}
.fox-tmr-n.urg{color:var(--fire)}.fox-tmr-t{flex:1;height:8px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}
.fox-tmr-f{height:100%;border-radius:999px;transition:width 1s linear;background:linear-gradient(90deg,#ffd166,var(--electric))}.fox-tmr-f.urg{background:linear-gradient(90deg,#ff8a65,var(--fire))}

.oc{background:linear-gradient(180deg,rgba(13,34,69,.9),rgba(8,24,51,.92));border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--line-soft);box-shadow:0 14px 32px rgba(0,0,0,.28)}
.oc h3{font-family:var(--fd);font-size:20px;color:var(--gold);letter-spacing:.12em;margin-bottom:12px;text-transform:uppercase}
.ob{padding:10px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.14em;background:var(--card2);color:var(--off);transition:all .16s ease;text-transform:uppercase}
.ob:hover{background:#1d3a69;color:var(--white)}.ob:active{transform:scale(.97)}.ob[disabled]{opacity:.25;pointer-events:none}
.ob.big{font-size:18px;padding:16px 26px;background:linear-gradient(135deg,#ffd166,var(--electric));color:#14223d;box-shadow:0 10px 26px rgba(242,168,0,.32)}.ob.big:hover{filter:brightness(1.04)}
.ob.aon{background:var(--gold);color:#09152d}
.oinp,.otxt{padding:9px 10px;border-radius:8px;border:1px solid rgba(242,168,0,.2);background:rgba(0,0,0,.18);color:var(--white);font-size:12px;width:100%;outline:none}
.otxt{min-height:56px;resize:vertical}
.oinp:focus,.otxt:focus{border-color:var(--electric);box-shadow:0 0 0 3px rgba(242,168,0,.12)}
.olbl{font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:.16em;margin-bottom:4px;text-transform:uppercase}
.ps-row{display:grid;grid-template-columns:repeat(9,minmax(72px,1fr));gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.ps{padding:10px 6px;border-radius:8px;text-align:center;font-family:var(--fd);font-size:11px;letter-spacing:.08em;background:rgba(16,38,77,.65);color:var(--muted);transition:all .14s;text-transform:uppercase;border:1px solid transparent;white-space:nowrap}
.ps.cur{background:linear-gradient(180deg,#ffd166,var(--electric));color:#081833;box-shadow:0 8px 18px rgba(242,168,0,.28)}.ps.done{background:rgba(37,196,106,.14);color:var(--green);border-color:rgba(37,196,106,.4)}
.ps.nxt{background:rgba(17,69,118,.4);color:#a4d7ff;border:1px dashed rgba(164,215,255,.5);cursor:pointer}.ps.nxt:hover{background:rgba(17,69,118,.66)}
.osc{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(0,0,0,.18);border-radius:10px;margin-bottom:6px}
.osc-n{font-family:var(--fd);font-size:15px;width:52px}.osc-v{font-family:var(--fm);font-size:22px;font-weight:700;width:50px;text-align:center}
.osc-b{width:34px;height:34px;border-radius:8px;font-size:15px;font-weight:700;background:var(--card2);color:var(--off);display:flex;align-items:center;justify-content:center}.osc-b:hover{background:#1f3b6b}
.jac{padding:12px;background:rgba(0,0,0,.16);border-radius:10px;margin-bottom:8px;border-left:4px solid var(--muted)}
.jac.jc{border-left-color:var(--green);background:rgba(34,197,94,.06)}.jac.ji{border-left-color:var(--fire);background:rgba(239,68,68,.06)}
.jb{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.jb.c{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.jb.i{background:rgba(239,68,68,.1);color:var(--fire);border:1px solid rgba(239,68,68,.3)}
.jb.h{background:rgba(240,165,0,.1);color:var(--gold);border:1px solid rgba(240,165,0,.3)}
.jb.sel{box-shadow:0 0 14px currentColor;filter:brightness(1.15)}
.lq{background:linear-gradient(180deg,rgba(13,34,69,.9),rgba(8,24,51,.92));border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--line-soft)}
.lar{display:flex;align-items:center;gap:8px;padding:9px 10px;background:rgba(0,0,0,.16);border-radius:8px;margin-bottom:5px;border-left:3px solid var(--muted)}
.lar.lc{border-left-color:var(--green);background:rgba(34,197,94,.05)}.lar.lw{border-left-color:var(--fire);background:rgba(239,68,68,.05)}
.pbtn{flex:1;padding:11px;border-radius:8px;border:2px solid var(--muted);background:transparent;color:var(--white);font-family:var(--fd);font-size:14px;letter-spacing:.08em}
.pbtn:active{transform:scale(.97)}.pbtn.voted{border-color:var(--electric);background:rgba(0,180,216,.08);color:var(--electric)}
.scr-f,.sb-f{width:100%;max-width:960px;margin:0 auto;aspect-ratio:16/9;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--line);box-shadow:0 20px 44px rgba(0,0,0,.35)}
.scr-f{background:var(--bg)}.sb-f{background:#00ff00}
.scr-i{width:1920px;height:1080px;transform-origin:top left;position:absolute;top:0;left:0}
.op-shell{padding:18px 14px 28px;max-width:1180px;margin:0 auto}
.op-shell .op-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}
.op-side .oc{margin-bottom:14px}

@media (max-width:980px){.topbar{height:auto;min-height:58px;flex-wrap:wrap;padding:8px 10px}.topbar .logo{font-size:24px}.v{padding-top:74px}.tbtn{font-size:10px;padding:7px 10px}.ps-row{grid-template-columns:repeat(9,minmax(88px,1fr))}.op-shell{padding:12px}.op-shell .op-grid{grid-template-columns:1fr}.ft-name{font-size:14px}.ft-score{font-size:23px}}
@media (max-width:640px){.fox-scores{overflow-x:auto}.ft{min-width:110px;padding:10px 11px}.ft-rnd{min-width:66px;padding:9px 11px}.oc{padding:13px;border-radius:12px}.ob.big{font-size:16px;padding:14px 18px}}

@keyframes heartbeat{0%{transform:scale(1)}15%{transform:scale(1.1)}30%{transform:scale(1)}45%{transform:scale(1.06)}60%{transform:scale(1)}}
@keyframes tickPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.96)}}
</style>
</head>
<body>
<div class="topbar"><div class="logo"><img src="assets/nad-logo.png" alt="NAD logo"><span>CoBo</span></div>
<button class="tbtn on" onclick="sw('op')">OPERATOR</button><button class="tbtn" onclick="sw('tm')">TEAM</button>
<button class="tbtn" onclick="sw('jg')">JUDGE</button><button class="tbtn" onclick="sw('lv')">AUDIENCE</button>
<button class="tbtn" onclick="sw('sc')">SCREEN</button><button class="tbtn" onclick="sw('sb')">SCOREBAR</button>
<div class="tphase"><b id="gph">IDLE</b></div></div>

<div id="v-op" class="v on"><div class="fox-scores" id="opf"></div><div class="op-shell" id="opb"></div></div>
<div id="v-tm" class="v"><div class="fox-scores" id="tmf"></div><div id="tmt"></div><div style="max-width:620px;margin:0 auto;padding:14px" id="tmb"></div></div>
<div id="v-jg" class="v"><div class="fox-scores" id="jgf"></div><div style="max-width:620px;margin:0 auto;padding:14px" id="jgb"></div></div>
<div id="v-lv" class="v"><div style="background:var(--gold);padding:10px 14px;display:flex;justify-content:space-between;border-bottom:2px solid rgba(0,0,0,.08)">
  <div style="font-family:var(--fd);font-size:20px;color:var(--panel);letter-spacing:3px;font-weight:800;display:flex;align-items:center;gap:10px"><img src="assets/nad-logo.png" alt="NAD logo" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))">CoBo — NAD Live</div>
  <div style="font-family:var(--fb);font-size:10px;color:rgba(11,30,61,.62)"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:3px"></span>CONNECTED</div></div>
  <div class="fox-scores" id="lvf"></div>
  <div style="display:flex;background:var(--panel);border-bottom:1px solid rgba(242,168,0,.18)" id="lvtabs">
    <button class="tbtn on" style="flex:1;padding:8px" onclick="lt('game')">GAME</button>
    <button class="tbtn" style="flex:1;padding:8px" onclick="lt('predict')">PREDICT</button>
    <button class="tbtn" style="flex:1;padding:8px" onclick="lt('teams')">TEAMS</button></div>
  <div style="padding:10px" id="lvb"></div></div>
<div id="v-sc" class="v"><div style="padding:6px"><div style="text-align:center;font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:2px;padding:4px">NAD BROADCAST 1920×1080</div>
  <div class="scr-f" id="sf"><div class="scr-i" id="si"></div></div></div></div>
<div id="v-sb" class="v"><div style="padding:6px"><div style="text-align:center;font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:2px;padding:4px">NAD SCOREBAR OVERLAY</div>
  <div class="sb-f" id="bf"><div class="scr-i" id="bi"></div></div></div></div>

<script>
const P={1:1,2:3,3:5},C={1:{c:2,w:-1},2:{c:6,w:-3},3:{c:10,w:-5}};
const CATS=["Arts & Literature","History & Government","Geography","Science, Tech & Nature","Sports & Leisure","Deaf Heritage & Culture","Entertainment","Current Events","Mathematics"];
const SQ=[{cat:"Deaf Heritage & Culture",text:"In 1988, this historic protest at Gallaudet University led to the appointment of the university's first Deaf president.",answer:"Deaf President Now"},
{cat:"History & Government",text:"This amendment to the U.S. Constitution, ratified in 1920, granted women the right to vote.",answer:"19th Amendment"},
{cat:"Entertainment",text:"This 2022 film about a Deaf family won the Academy Award for Best Picture.",answer:"CODA"},
{cat:"Mathematics",text:"What is the only even prime number?",answer:"2"}];
let si=0;
const TR={idle:["category"],category:["challenge"],challenge:["question"],question:["timer"],timer:["time_up"],time_up:["reveal"],reveal:["judging"],judging:["scoring"],scoring:["category","round_transition","champion"],round_transition:["category"],champion:["idle"]};
let G={phase:"idle",round:1,qn:0,q:{cat:"",text:"",ans:"",lk:false,vis:false,no:null,scored:false},
teams:[{id:"a",name:"GALLAUDET",sh:"GU",col:"#2563eb",score:0,ch:false,a:{t:"",s:"idle"},sc:{r:null,d:0},players:[{n:"Jordan K.",y:"Sr",m:"Poli Sci"},{n:"Maya R.",y:"Jr",m:"Biology"},{n:"Elias T.",y:"Sr",m:"Math"},{n:"Drea W.",y:"So",m:"History"}],on:[0,1,2],coach:"Dr. Allen"},
{id:"b",name:"RIT/NTID",sh:"RIT",col:"#dc2626",score:0,ch:false,a:{t:"",s:"idle"},sc:{r:null,d:0},players:[{n:"Priya S.",y:"Sr",m:"CS"},{n:"Liam F.",y:"Jr",m:"Eng"},{n:"Tessa M.",y:"Sr",m:"Physics"},{n:"Noah C.",y:"Jr",m:"Design"}],on:[0,1,2],coach:"Prof. Chen"},
{id:"c",name:"CSUN",sh:"CSUN",col:"#d97706",score:0,ch:false,a:{t:"",s:"idle"},sc:{r:null,d:0},players:[{n:"Kai L.",y:"Sr",m:"Deaf Studies"},{n:"Ava B.",y:"Jr",m:"Chem"},{n:"Marcus D.",y:"Sr",m:"English"},{n:"Zara P.",y:"So",m:"Ling"}],on:[0,1,2],coach:"Dr. Ramirez"}],
tmr:{dur:25,rem:25,run:false},judges:[{id:"j1",d:{}},{id:"j2",d:{}},{id:"j3",d:{}}],con:{},pred:{open:false,v:{},my:null}};
let ti=null,cv="op",ltb="game",tv="a";
let D={cat:"",text:"",ans:""};

function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function teamById(id){return G.teams.find(t=>t.id===id)||G.teams[0];}
function setDraft(k,v){D[k]=v;}
function norm(v){return String(v??"").trim().replace(/\s+/g," ").toLowerCase();}
function curQ(){return G.q.no??(G.q.text||G.q.cat?G.qn+1:null);}
function canAdvance(){
if(!nxt().length)return false;
if(G.phase==="scoring"&&!G.q.scored)return false;
return true;
}
function nextPhaseLabel(){
if(!canAdvance())return"";
const n=nxt();if(!n.length)return"";
if(G.phase!=="scoring")return n[0];
return G.qn>=18?(G.round>=3?"champion":"round_transition"):"category";
}
function teamOutcome(t){
if(["judging","scoring"].includes(G.phase)){
const c=G.con[t.id]||"pending";
if(["correct","incorrect","hold","conflict","pending"].includes(c))return c;
}
if(!norm(G.q.ans))return"pending";
return norm(t.a.t)===norm(G.q.ans)?"correct":"incorrect";
}
function teamDelta(t){
const out=teamOutcome(t);
if(out==="correct")return t.ch?C[G.round].c:P[G.round];
if(out==="incorrect")return t.ch?C[G.round].w:0;
return null;
}
function setPredOpen(open){
if(open){G.pred={open:true,v:{},my:null};return;}
G.pred={...G.pred,open:false,my:null};
}

function sw(v){cv=v;document.querySelectorAll(".v").forEach(e=>e.classList.remove("on"));document.getElementById("v-"+v).classList.add("on");
document.querySelectorAll(".topbar .tbtn").forEach(b=>b.classList.remove("on"));document.querySelector(`.tbtn[onclick="sw('${v}')"]`)?.classList.add("on");R();}
function lt(t){ltb=t;document.querySelectorAll("#lvtabs .tbtn").forEach(b=>b.classList.toggle("on",b.textContent===t.toUpperCase()));R();}

function fxS(id){document.getElementById(id).innerHTML=`<div class="ft-rnd"><div class="ft-rnd-l">ROUND</div><div class="ft-rnd-v">R${G.round}</div></div>`+
G.teams.map(t=>`<div class="ft"><div class="ft-color" style="background:${t.col}"></div><div class="ft-name">${t.sh}</div>${t.ch?'<div class="ft-chal">⚡</div>':''}<div class="ft-score">${t.score}</div></div>`).join("");}
function fxT(){if(!G.tmr.run&&G.phase!=="time_up"&&G.phase!=="timer")return"";const p=(G.tmr.rem/G.tmr.dur)*100,u=G.tmr.rem<=5;
return`<div class="fox-tmr"><div class="fox-tmr-n ${u?"urg":""}">${G.tmr.rem}</div><div class="fox-tmr-t"><div class="fox-tmr-f ${u?"urg":""}" style="width:${p}%"></div></div></div>`;}

function nxt(){return TR[G.phase]||[];}
function adv(){if(!canAdvance())return;const t=nextPhaseLabel();if(!t)return;sp(t);}
function sp(p){if(!TR[G.phase]?.includes(p))return;G.phase=p;
if(p==="timer"){stopT();G.tmr.rem=G.tmr.dur;G.tmr.run=true;ti=setInterval(()=>{if(G.tmr.rem>0){G.tmr.rem--;R();}if(G.tmr.rem<=0)sp("time_up");},1000);}
if(p==="time_up"){stopT();G.q.lk=true;G.teams.forEach(t=>t.a.s="locked");}
if(p==="reveal")G.q.vis=true;if(p==="scoring")cc();if(p==="round_transition"){G.round=Math.min(3,G.round+1);G.qn=0;}
if(p==="question")setPredOpen(true);
if(["idle","category","challenge","time_up","reveal","judging","scoring","round_transition","champion"].includes(p))setPredOpen(false);
if(p==="idle")rq();R();}
function stopT(){if(ti){clearInterval(ti);ti=null;}G.tmr.run=false;}
function rq(){G.q={cat:"",text:"",ans:"",lk:false,vis:false,no:null,scored:false};G.teams.forEach(t=>{t.ch=false;t.a={t:"",s:"idle"};t.sc={r:null,d:0};});
G.judges.forEach(j=>j.d={});G.con={};G.pred={open:false,v:{},my:null};}
function cc(){G.con={};G.teams.forEach(t=>{const d=G.judges.map(j=>j.d[t.id]||null);
if(d.some(v=>!v)){G.con[t.id]="pending";return;}if(d.includes("hold")){G.con[t.id]="hold";return;}
G.con[t.id]=d.every(x=>x==="correct")?"correct":d.every(x=>x==="incorrect")?"incorrect":"conflict";});}
function asc(){if(G.phase!=="scoring"||G.q.scored)return;if(Object.values(G.con).some(v=>["pending","hold","conflict"].includes(v))){alert("Resolve all first.");return;}
G.teams.forEach(t=>{const ok=G.con[t.id]==="correct";const d=t.ch?(ok?C[G.round].c:C[G.round].w):(ok?P[G.round]:0);t.score+=d;t.sc={r:ok?"correct":"incorrect",d};});G.q.scored=true;G.qn++;R();}
function ldQ(){const cat=D.cat.trim(),text=D.text.trim(),ans=D.ans.trim();if(!cat||!text||!ans){alert("Load a category, question, and official answer first.");return;}
rq();G.q={cat,text,ans,lk:false,vis:false,no:G.qn+1,scored:false};G.phase="idle";R();}
function smQ(){const q=SQ[si%SQ.length];si++;D={cat:q.cat,text:q.text,ans:q.answer};ldQ();}

function R(){document.getElementById("gph").textContent=G.phase.toUpperCase().replace(/_/g," ");
fxS("opf");fxS("tmf");fxS("jgf");fxS("lvf");
({op:rOp,tm:rTm,jg:rJg,lv:rLv,sc:rSc,sb:rSb})[cv]?.();}

function rOp(){const n=nxt(),nextLabel=nextPhaseLabel();const phs=["idle","category","challenge","question","timer","time_up","reveal","judging","scoring"];
const pi=phs.indexOf(G.phase);
let h=`<div class="oc"><h3>Question Flow</h3><div class="ps-row">${phs.map((p,i)=>{
const jumpable=n.includes(p)&&canAdvance();
const cl=p===G.phase?"cur":i<pi?"done":jumpable?"nxt":"";
