<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#091325" />
  <title>Stephanie Hakulin — NAD SF26 Presidents Series</title>
  <style>
    :root {
      color-scheme: dark;
      --stage-top: #162746;
      --stage-bottom: #050913;
      --ink: #fff8e8;
      --ink-soft: rgba(255, 248, 232, 0.78);
      --ink-faint: rgba(255, 248, 232, 0.52);
      --shadow: 0 34px 90px rgba(0, 0, 0, 0.46);
      --outline: rgba(255, 245, 220, 0.28);
      --outline-soft: rgba(255, 245, 220, 0.14);
      --headline: Impact, Haettenschweiler, "Arial Narrow Bold", "Segoe UI Condensed", sans-serif;
      --body: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --shell:
        radial-gradient(circle at 50% 14%, rgba(255, 247, 216, 0.20) 0, transparent 24%),
        radial-gradient(circle at 16% 12%, rgba(255, 241, 179, 0.18) 0, transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(255, 211, 122, 0.16) 0, transparent 20%),
        linear-gradient(180deg, #443016 0%, #84561d 17%, #e7c56f 44%, #c18a3b 60%, #6f4718 82%, #2f1b09 100%);
      --foil:
        linear-gradient(118deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.02) 16%, rgba(255, 245, 214, 0.16) 34%, rgba(255, 255, 255, 0.03) 49%, rgba(255, 244, 210, 0.18) 64%, rgba(255, 255, 255, 0) 78%);
      --badge-fill: linear-gradient(180deg, rgba(108, 69, 26, 0.96), rgba(192, 133, 49, 0.96));
      --badge-edge: rgba(255, 244, 214, 0.44);
      --pill-fill: linear-gradient(180deg, rgba(7, 20, 39, 0.88), rgba(10, 25, 50, 0.60));
      --plate-fill: linear-gradient(180deg, rgba(23, 16, 9, 0.58), rgba(28, 18, 8, 0.34));
      --plate-glow: rgba(255, 225, 150, 0.14);
      --panel-fill: linear-gradient(180deg, rgba(18, 13, 8, 0.38), rgba(18, 13, 8, 0.20));
      --stat-line: rgba(255, 247, 221, 0.18);
      --tax-1: "PRES";
      --tax-2: "ICON";
      --tax-3: "SERIES I";
      --tag-1: "NAD";
      --tag-2: "PRESIDENT";
      --tag-3: "SF26";
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: var(--body);
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(39, 62, 111, 0.60), transparent 32%),
        radial-gradient(circle at 10% 85%, rgba(255, 190, 72, 0.06), transparent 24%),
        linear-gradient(180deg, var(--stage-top), var(--stage-bottom));
      overflow-x: hidden;
    }

    .stage {
      width: min(100%, 560px);
      display: grid;
      place-items: center;
    }

    .card {
      position: relative;
      width: min(100%, 474px);
      aspect-ratio: 0.71 / 1;
      overflow: hidden;
      isolation: isolate;
      clip-path: polygon(14% 0%, 86% 0%, 100% 12%, 100% 88%, 86% 100%, 14% 100%, 0% 88%, 0% 12%);
      background: var(--shell);
      box-shadow: var(--shadow);
      animation: cardAura 5.4s ease-in-out infinite;
    }

    .card::before,
    .card::after,
    .inner-line::before,
    .facet-frame::before,
    .facet-frame::after,
    .portrait-shell::before,
    .portrait-shell::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .card::before {
      inset: 0;
      background: var(--foil);
      mix-blend-mode: screen;
      opacity: 0.88;
      z-index: 0;
    }

    .card::after {
      inset: 0;
      background:
        linear-gradient(146deg, transparent 0 44%, rgba(255, 255, 255, 0.09) 44% 45%, transparent 45% 100%),
        linear-gradient(34deg, transparent 0 61%, rgba(255, 247, 221, 0.08) 61% 62%, transparent 62% 100%),
        radial-gradient(circle at 50% 26%, rgba(255, 255, 255, 0.13), transparent 21%);
      opacity: 0.54;
      z-index: 0;
    }

    .inner-line {
      position: absolute;
      inset: 10px;
      z-index: 1;
      clip-path: polygon(14% 0%, 86% 0%, 100% 12%, 100% 88%, 86% 100%, 14% 100%, 0% 88%, 0% 12%);
    }

    .inner-line::before {
      inset: 0;
      border: 1px solid var(--outline);
      border-radius: 28px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .sheen {
      position: absolute;
      inset: 0;
      z-index: 6;
      overflow: hidden;
      pointer-events: none;
    }

    .sheen::before {
      content: "";
      position: absolute;
      top: -48%;
      left: -16%;
      width: 24%;
      height: 196%;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.04) 24%, rgba(255, 255, 255, 0.24) 48%, rgba(255, 255, 255, 0.04) 72%, transparent 100%);
      transform: skewX(-15deg);
      animation: shimmer 4.8s cubic-bezier(.45, 0, .55, 1) infinite;
    }

    .topband {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 7;
      min-width: 56%;
      max-width: 78%;
      padding: 9px 22px 8px;
      text-align: center;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font: 700 0.72rem/1 var(--headline);
      color: rgba(255, 248, 232, 0.94);
      background: var(--pill-fill);
      border: 1px solid rgba(255, 247, 221, 0.18);
      border-radius: 999px;
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.35);
    }

    .topband::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .ovr-rail {
      position: absolute;
      top: 95px;
      left: 22px;
      width: 118px;
      z-index: 7;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.48);
    }

    .position-box {
      width: 76px;
      height: 60px;
      display: grid;
      place-items: center;
      margin-bottom: 10px;
      font: 700 2.14rem/1 var(--headline);
      letter-spacing: 0.04em;
      color: var(--ink);
      background: var(--badge-fill);
      border: 2px solid rgba(255, 248, 232, 0.78);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      animation: badgePulse 3s ease-in-out infinite;
    }

    .ovr {
      margin: 0 0 2px;
      font: 700 7.35rem/0.78 var(--headline);
      letter-spacing: 0.01em;
      color: var(--ink);
      animation: ovrPulse 3.4s ease-in-out infinite;
    }

    .taxonomy {
      display: grid;
      gap: 3px;
      width: 92px;
      margin-top: 6px;
      font-family: var(--headline);
      text-transform: uppercase;
      line-height: 0.9;
    }

    .tax {
      display: block;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .tax.a {
      font-size: 1.9rem;
    }

    .tax.b {
      font-size: 1.55rem;
      color: rgba(255, 248, 232, 0.96);
    }

    .tax.c {
      margin-top: 5px;
      font-size: 0.86rem;
      color: var(--ink-soft);
      letter-spacing: 0.18em;
    }

    .meta-rail {
      position: absolute;
      top: 132px;
      right: 22px;
      z-index: 7;
      display: grid;
      gap: 12px;
      width: 118px;
    }

    .meta-pill {
      min-height: 52px;
      display: grid;
      place-items: center;
      padding: 8px 10px;
      clip-path: polygon(8% 6%, 92% 0%, 100% 50%, 92% 100%, 8% 94%, 0 50%);
      font: 700 1.24rem/1 var(--headline);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--badge-fill);
      border: 1px solid var(--badge-edge);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .facet-frame {
      position: absolute;
      left: 21.8%;
      right: 16.8%;
      top: 18.2%;
      height: 45.5%;
      z-index: 2;
      clip-path: polygon(21% 4%, 79% 4%, 92% 18%, 93% 60%, 75% 100%, 25% 100%, 7% 60%, 8% 18%);
      background:
        linear-gradient(180deg, rgba(22, 16, 9, 0.24), rgba(22, 16, 9, 0.04)),
        radial-gradient(circle at 50% 8%, rgba(255, 243, 191, 0.16), transparent 38%);
    }

    .facet-frame::before {
      inset: 0;
      border: 1px solid rgba(255, 247, 221, 0.15);
      clip-path: inherit;
    }

    .facet-frame::after {
      inset: 7% 9% 12%;
      clip-path: polygon(14% 5%, 86% 5%, 95% 24%, 90% 76%, 74% 98%, 26% 98%, 10% 76%, 5% 24%);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 55%),
        radial-gradient(circle at 50% 14%, rgba(255, 233, 159, 0.12), transparent 44%);
      opacity: 0.8;
    }

    .portrait-zone {
      position: absolute;
      left: 24.2%;
      right: 18.8%;
      top: 19.4%;
      height: 43.2%;
      z-index: 4;
    }

    .portrait-shell {
      position: absolute;
      inset: 0;
      clip-path: polygon(16% 5%, 84% 5%, 94% 23%, 91% 72%, 74% 99%, 26% 99%, 9% 72%, 6% 23%);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 244, 208, 0.22), transparent 31%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(12, 9, 5, 0.02));
      box-shadow:
        inset 0 0 0 1px rgba(255, 247, 221, 0.16),
        inset 0 -24px 36px rgba(24, 15, 7, 0.22);
    }

    .portrait-shell::before {
      inset: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 233, 163, 0.24), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 54%);
      filter: blur(12px);
      opacity: 0.95;
    }

    .portrait-shell::after {
      left: 10%;
      right: 10%;
      top: 8%;
      bottom: 10%;
      clip-path: polygon(13% 4%, 87% 4%, 96% 24%, 91% 76%, 73% 98%, 27% 98%, 9% 76%, 4% 24%);
      border: 1px solid rgba(255, 247, 221, 0.08);
    }

    .portrait-shadow {
      position: absolute;
      inset: 18% 18% 4%;
      border-radius: 44% 44% 36% 36% / 36% 36% 24% 24%;
      background:
        radial-gradient(circle at 50% 35%, rgba(0, 0, 0, 0.36), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(22, 14, 8, 0.36), transparent 64%);
      filter: blur(20px);
      opacity: 0.9;
      z-index: 0;
    }

    .portrait {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: end center;
      z-index: 2;
      overflow: hidden;
      clip-path: polygon(16% 5%, 84% 5%, 94% 23%, 91% 72%, 74% 99%, 26% 99%, 9% 72%, 6% 23%);
    }

    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter:
        drop-shadow(0 20px 28px rgba(0, 0, 0, 0.34))
        drop-shadow(0 0 22px rgba(255, 225, 148, 0.10));
      transform: translateY(10px) scale(1.08);
      mask-image:
        radial-gradient(circle at 50% 32%, #000 0 44%, transparent 78%),
        linear-gradient(180deg, transparent 0, #000 12%, #000 90%, transparent 100%);
      -webkit-mask-image:
        radial-gradient(circle at 50% 32%, #000 0 44%, transparent 78%),
        linear-gradient(180deg, transparent 0, #000 12%, #000 90%, transparent 100%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    .nameplate {
      position: absolute;
      left: 11.2%;
      right: 11.2%;
      top: 61.1%;
      z-index: 7;
      padding: 12px 18px 11px;
      text-align: center;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(26, 17, 8, 0.72), rgba(26, 17, 8, 0.36)),
        radial-gradient(circle at 50% 0, var(--plate-glow), transparent 56%);
      border: 1px solid rgba(255, 247, 221, 0.18);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.20),
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 0 0 1px rgba(255, 224, 146, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .nameplate::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .name {
      margin: 0;
      font: 700 clamp(2.06rem, 5.2vw, 3.06rem) / 0.88 var(--headline);
      letter-spacing: 0.055em;
      text-transform: uppercase;
      color: var(--ink);
      text-shadow:
        0 2px 18px rgba(0, 0, 0, 0.56),
        0 0 28px rgba(255, 255, 255, 0.06);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .subtitle {
      margin-top: 6px;
      font: 700 0.61rem/1.18 var(--body);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 247, 221, 0.74);
      white-space: normal;
    }

    .stats-wrap {
      position: absolute;
      left: 9.8%;
      right: 9.8%;
      top: 76.8%;
      bottom: 5.2%;
      z-index: 7;
      padding: 8px 10px 0;
      border-radius: 18px;
      background: var(--panel-fill);
      border: 1px solid rgba(255, 247, 221, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 16px;
      row-gap: 6px;
      height: 100%;
      align-content: start;
    }

    .stat-col {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .stat-col + .stat-col {
      padding-left: 14px;
      border-left: 1px solid rgba(255, 247, 221, 0.14);
    }

    .stat {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      gap: 10px;
      padding: 4px 0 5px;
      border-bottom: 1px solid var(--stat-line);
    }

    .stat:last-child {
      border-bottom: 0;
    }

    .lab {
      font: 700 0.72rem/1 var(--body);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255, 247, 221, 0.76);
    }

    .val {
      min-width: 34px;
      text-align: right;
      font: 700 1.56rem/0.92 var(--headline);
      letter-spacing: 0.04em;
      color: #fffdf7;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.34);
    }

    .nad-mark {
      position: absolute;
      left: 50%;
      bottom: 2.15%;
      z-index: 8;
      width: 72px;
      height: 82px;
      display: grid;
      place-items: center;
      padding: 11px 10px 16px;
      transform: translateX(-50%);
      isolation: isolate;
      clip-path: polygon(16% 0%, 84% 0%, 100% 18%, 100% 68%, 50% 100%, 0% 68%, 0% 18%);
      background:
        linear-gradient(180deg, rgba(255, 247, 221, 0.34), rgba(255, 247, 221, 0.02) 24%),
        linear-gradient(180deg, #3a240d 0%, #8a5a1f 30%, #c99243 58%, #5a3812 100%);
      border: 1px solid rgba(255, 244, 214, 0.52);
      box-shadow:
        0 14px 24px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -6px 12px rgba(34, 19, 3, 0.42);
    }

    .nad-mark::before,
    .nad-mark::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .nad-mark::before {
      inset: 3px;
      clip-path: polygon(16% 0%, 84% 0%, 100% 18%, 100% 68%, 50% 100%, 0% 68%, 0% 18%);
      background:
        linear-gradient(180deg, rgba(16, 24, 43, 0.92), rgba(9, 18, 34, 0.74)),
        radial-gradient(circle at 50% 26%, rgba(255, 244, 214, 0.18), transparent 52%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      z-index: 0;
    }

    .nad-mark::after {
      width: 48px;
      height: 48px;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 38%, #ffffff 0%, #fffdfa 58%, #f0e7d3 100%);
      border: 2px solid rgba(255, 244, 214, 0.72);
      box-shadow:
        0 3px 10px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -2px 5px rgba(193, 163, 98, 0.34);
      z-index: 1;
    }

    .nad-mark img {
      position: relative;
      z-index: 2;
      display: block;
      width: 44px;
      height: 44px;
      object-fit: contain;
      object-position: center;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.14);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .family-gold {
      --shell:
        radial-gradient(circle at 50% 14%, rgba(255, 247, 216, 0.20) 0, transparent 24%),
        radial-gradient(circle at 16% 12%, rgba(255, 241, 179, 0.18) 0, transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(255, 211, 122, 0.16) 0, transparent 20%),
        linear-gradient(180deg, #443016 0%, #84561d 17%, #e7c56f 44%, #c18a3b 60%, #6f4718 82%, #2f1b09 100%);
      --badge-fill: linear-gradient(180deg, rgba(108, 69, 26, 0.96), rgba(192, 133, 49, 0.96));
      --plate-glow: rgba(255, 225, 150, 0.14);
    }

    .family-emerald {
      --shell:
        radial-gradient(circle at 50% 14%, rgba(235, 255, 239, 0.18) 0, transparent 24%),
        radial-gradient(circle at 18% 14%, rgba(145, 255, 198, 0.16) 0, transparent 24%),
        radial-gradient(circle at 80% 18%, rgba(136, 255, 211, 0.14) 0, transparent 20%),
        linear-gradient(180deg, #103723 0%, #196a40 19%, #4fb97d 46%, #21764f 66%, #0b1e2c 100%);
      --badge-fill: linear-gradient(180deg, rgba(25, 93, 62, 0.96), rgba(72, 164, 115, 0.96));
      --plate-glow: rgba(161, 255, 210, 0.12);
    }

    .family-ruby {
      --shell:
        radial-gradient(circle at 50% 14%, rgba(255, 235, 231, 0.16) 0, transparent 24%),
        radial-gradient(circle at 18% 14%, rgba(255, 182, 164, 0.16) 0, transparent 24%),
        radial-gradient(circle at 80% 18%, rgba(255, 214, 164, 0.12) 0, transparent 18%),
        linear-gradient(180deg, #3a1116 0%, #81202a 22%, #d85a41 47%, #8a261e 69%, #240b12 100%);
      --badge-fill: linear-gradient(180deg, rgba(120, 27, 40, 0.96), rgba(190, 65, 78, 0.96));
      --plate-glow: rgba(255, 178, 145, 0.12);
    }

    .family-obsidian {
      --shell:
        radial-gradient(circle at 50% 14%, rgba(255, 255, 255, 0.10) 0, transparent 22%),
        radial-gradient(circle at 18% 14%, rgba(192, 207, 255, 0.10) 0, transparent 20%),
        radial-gradient(circle at 82% 18%, rgba(160, 189, 255, 0.10) 0, transparent 18%),
        linear-gradient(180deg, #12151b 0%, #252b38 22%, #596276 47%, #262c39 70%, #0a0d14 100%);
      --badge-fill: linear-gradient(180deg, rgba(37, 44, 58, 0.96), rgba(95, 106, 127, 0.96));
      --plate-glow: rgba(202, 214, 255, 0.12);
    }

    .family-live {
      --shell:
        radial-gradient(circle at 50% 14%, rgba(255, 247, 216, 0.14) 0, transparent 24%),
        radial-gradient(circle at 16% 12%, rgba(255, 177, 122, 0.14) 0, transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(244, 95, 83, 0.14) 0, transparent 20%),
        linear-gradient(180deg, #36210f 0%, #8f4118 17%, #f0a85d 44%, #b44d2c 60%, #5a2212 82%, #200d07 100%);
      --badge-fill: linear-gradient(180deg, rgba(112, 51, 20, 0.96), rgba(203, 95, 46, 0.96));
      --plate-glow: rgba(255, 186, 125, 0.14);
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-120%) skewX(-15deg);
        opacity: 0.72;
      }
      60% {
        opacity: 0.94;
      }
      100% {
        transform: translateX(240%) skewX(-15deg);
        opacity: 0.72;
      }
    }

    @keyframes ovrPulse {
      0%, 100% {
        text-shadow: 0 0 20px rgba(255, 220, 108, 0.50), 0 3px 14px rgba(0, 0, 0, 0.52);
      }
      50% {
        text-shadow: 0 0 34px rgba(255, 220, 108, 0.82), 0 0 70px rgba(255, 196, 86, 0.28), 0 3px 14px rgba(0, 0, 0, 0.52);
      }
    }

    @keyframes badgePulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
    }

    @keyframes cardAura {
      0%, 100% {
        box-shadow: var(--shadow);
      }
      50% {
        box-shadow: var(--shadow), 0 0 64px rgba(255, 210, 84, 0.12), 0 0 118px rgba(255, 194, 66, 0.05);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        width: min(100%, 450px);
      }

      .topband {
        min-width: 60%;
        font-size: 0.66rem;
        letter-spacing: 0.12em;
      }

      .ovr-rail {
        left: 18px;
        width: 104px;
      }

      .ovr {
        font-size: 6.4rem;
      }

      .tax.a {
        font-size: 1.72rem;
      }

      .tax.b {
        font-size: 1.38rem;
      }

      .tax.c {
        font-size: 0.78rem;
      }

      .meta-rail {
        right: 18px;
