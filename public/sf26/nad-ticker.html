<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NAD Ticker — SF26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1E3D;
    --gold: #F2A800;
    --speed: 200s;
  }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
  body { display:flex; align-items:flex-end; }

  .ticker-wrap {
    position: fixed;
    bottom:0; left:0; right:0;
    background: var(--navy);
    border-top: 4px solid var(--gold);
    box-shadow: 0 -12px 60px rgba(0,0,0,0.85);
  }

  /* ── Label bar ── */
  .label-bar {
    height: 34px;
    background: var(--gold);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    overflow: hidden;
  }
  /* Logo on gold: color logo (rust/steel) works great on gold — just show it */
  .logo-label {
    width: 26px; height: 26px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
    /* No filter — rust and steel blue read well on gold */
  }
  .label-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: .15em;
    color: #0B1E3D;
    white-space: nowrap;
    line-height: 1;
  }

  /* ── Track ── */
  .track {
    height: 62px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
  }
  .track::before, .track::after {
    content: '';
    position: absolute;
    top:0; bottom:0; width:80px;
    z-index:5; pointer-events:none;
  }
  .track::before { left:0;  background: linear-gradient(to right, var(--navy), transparent); }
  .track::after  { right:0; background: linear-gradient(to left,  var(--navy), transparent); }

  .inner {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: roll var(--speed) linear infinite;
    will-change: transform;
    padding-left: 80px;
  }
  .inner:hover { animation-play-state: paused; }
  @keyframes roll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── Entry ── */
  .entry { display:inline-flex; align-items:baseline; padding:0 6px; }
  .yr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; color: var(--gold);
    letter-spacing: .04em; min-width: 58px;
  }
  .num {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight:700;
    color: rgba(242,168,0,.45);
    letter-spacing:.1em; text-transform:uppercase;
    padding:0 5px; align-self:flex-end; margin-bottom:7px;
  }
  .city {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px; font-weight:700; color: #fff;
  }
  .pres {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px; font-weight:500;
    color: rgba(255,255,255,.65);
    margin-left:11px; padding-left:11px;
    border-left:1px solid rgba(255,255,255,.2);
  }
  .note {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight:700; font-style:italic;
    color: rgba(242,168,0,.78);
    margin-left:10px; padding-left:10px;
    border-left:1px solid rgba(242,168,0,.25);
  }
  .mile { display:inline-flex; align-items:center; gap:7px; padding:0 8px; }
  .mile-yr { font-family:'Bebas Neue',sans-serif; font-size:20px; color:rgba(242,168,0,.35); }
  .mile-txt { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; font-style:italic; color:rgba(255,255,255,.3); }
  .sf26 {
    background:rgba(242,168,0,.1);
    border:1px solid rgba(242,168,0,.38);
    border-radius:3px; padding:3px 12px !important;
  }
  .sf26 .yr { color:#FFD166; }
  .sf26 .city { color:#FFD166; }
  .sf26 .pres { color:rgba(255,215,100,.85); border-left-color:rgba(242,168,0,.4); }
  .dot {
    display:inline-block; width:4px; height:4px;
    background:var(--gold); border-radius:50%;
    margin:0 20px; opacity:.45; flex-shrink:0; align-self:center;
  }

  /* ── Brand strip ── */
  .brand-strip {
    height: 22px;
    background: rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center; gap:9px;
    overflow: hidden;
    white-space: nowrap;
  }
  .logo-brand {
    width: 15px; height: 15px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .brand-txt {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing:.18em;
    color: rgba(255,255,255,.3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
