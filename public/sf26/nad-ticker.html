<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#060F1E">
<title>NAD Ticker — SF26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #060F1E;
  --gold: #F2A800;
  --gold-bright: #FFD166;
  --speed: 220s;
}
html, body { width:100%; height:100%; background-color: transparent !important; background: transparent !important; overflow:hidden; }
body { display:flex; align-items:flex-end; }

/* ── Wrapper ── */
.ticker-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  background: var(--navy);
  border-top: 5px solid var(--gold);
  box-shadow: 0 -24px 80px rgba(0,0,0,0.92), 0 -6px 24px rgba(0,0,0,0.6);
}

/* ── Label bar ── */
.label-bar {
  height: 46px;
  background: linear-gradient(90deg, #CF9000 0%, #E8A200 15%, var(--gold) 35%, #F5BA00 65%, #E8A200 85%, #CF9000 100%);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 22px;
  overflow: hidden;
  position: relative;
}
.label-bar::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.22) 0%, transparent 55%);
  pointer-events: none;
}
.logo-label {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  object-fit: cover;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,.35));
  position: relative; z-index: 1;
}
.label-left {
  display: flex; align-items: center; gap: 16px;
  position: relative; z-index: 1;
}
.label-title {
  font-family: "Bebas Neue", sans-serif;
  font-size: 22px;
  letter-spacing: .2em;
  color: #060F1E;
  white-space: nowrap;
  line-height: 1;
}
.label-divider {
  width: 1px; height: 22px;
  background: rgba(6,15,30,.28);
  flex-shrink: 0;
}
.label-sub {
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(6,15,30,.75);
  white-space: nowrap;
}

/* ── Track ── */
.track {
  height: 92px;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  background: linear-gradient(180deg,
    rgba(255,255,255,.03) 0%,
    transparent 30%,
    transparent 70%,
    rgba(0,0,0,.18) 100%);
}
.track::before, .track::after {
  content: "";
  position: absolute; top: 0; bottom: 0; width: 140px;
  z-index: 5; pointer-events: none;
}
.track::before { left: 0; background: linear-gradient(to right, var(--navy) 15%, transparent); }
.track::after { right: 0; background: linear-gradient(to left, var(--navy) 15%, transparent); }
.track-rule {
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(242,168,0,.22) 20%, rgba(242,168,0,.22) 80%, transparent 100%);
  pointer-events: none; z-index: 3;
}

.inner {
  display: flex;
  align-items: center;
  white-space: nowrap;
  animation: roll var(--speed) linear infinite;
  will-change: transform;
  padding-left: 140px;
}
.inner:hover { animation-play-state: paused; }
@keyframes roll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── Entry ── */
.entry {
  display: inline-flex;
  align-items: center;
  padding: 0 12px;
  gap: 0;
}
.yr-block {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  margin-right: 14px;
  min-width: 78px;
}
.yr {
  font-family: "Bebas Neue", sans-serif;
  font-size: 50px;
  color: var(--gold);
  letter-spacing: .02em;
  line-height: .86;
  text-shadow: 0 0 50px rgba(242,168,0,.18);
}
.num {
  font-family: "DM Sans", sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: rgba(242,168,0,.7);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-top: 4px;
}
.info-block {
  display: inline-flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}
.city {
  font-family: "DM Sans", sans-serif;
  font-size: 23px;
  font-weight: 700;
  color: #fff;
  letter-spacing: .01em;
  line-height: 1;
}
.pres {
  font-family: "DM Sans", sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,.72);
  letter-spacing: .01em;
  line-height: 1;
}
.note {
  font-family: "DM Sans", sans-serif;
  font-size: 12px;
  font-weight: 600;
  font-style: italic;
  color: rgba(242,168,0,.9);
  letter-spacing: .02em;
  line-height: 1;
}

/* ── Milestone ── */
.mile {
  display: inline-flex; align-items: center; gap: 10px; padding: 0 14px;
}
.mile-yr {
  font-family: "Bebas Neue", sans-serif;
  font-size: 24px;
  color: rgba(242,168,0,.45);
  letter-spacing: .04em;
}
.mile-txt {
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  font-weight: 500;
  font-style: italic;
  color: rgba(255,255,255,.42);
  letter-spacing: .02em;
  max-width: 300px;
  white-space: normal;
  line-height: 1.3;
}

/* ── Separator ── */
.dot {
  display: inline-block;
  width: 3px; height: 3px;
  background: var(--gold);
  border-radius: 50%;
  margin: 0 30px;
  opacity: .28;
  flex-shrink: 0;
}

/* ── SF26 payoff ── */
.sf26 {
  background: linear-gradient(90deg,
    rgba(242,168,0,.06) 0%,
    rgba(242,168,0,.14) 40%,
    rgba(242,168,0,.14) 60%,
    rgba(242,168,0,.06) 100%);
  border-top: 1px solid rgba(242,168,0,.45);
  border-bottom: 1px solid rgba(242,168,0,.45);
  border-left: 2px solid var(--gold);
  border-right: 2px solid var(--gold);
  border-radius: 2px;
  padding: 0 24px !important;
  margin: 0 12px;
  box-shadow: 0 0 60px rgba(242,168,0,.1), inset 0 1px 0 rgba(255,255,255,.06);
}
.sf26 .yr-block { min-width: 92px; }
.sf26 .yr {
  font-size: 60px;
  color: var(--gold-bright);
  text-shadow: 0 0 80px rgba(255,209,102,.5), 0 0 28px rgba(242,168,0,.35);
}
.sf26 .num { color: rgba(255,209,102,.65); }
.sf26 .city {
  font-size: 28px;
  color: var(--gold-bright);
}
.sf26 .pres {
  font-size: 18px;
  color: rgba(255,209,102,.85);
}
.sf26 .note {
  font-size: 11px;
  color: rgba(255,209,102,.9);
}
.sf26-badge {
  display: inline-block;
  background: var(--gold);
  color: #060F1E;
  font-family: "Bebas Neue", sans-serif;
  font-size: 10px;
  letter-spacing: .22em;
  padding: 2px 7px 1px;
  border-radius: 1px;
  line-height: 1.2;
  margin-bottom: 3px;
  align-self: flex-start;
}

/* ── Brand strip ── */
.brand-strip {
  height: 22px;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  overflow: hidden;
}
.logo-brand {
  width: 14px; height: 14px;
  border-radius: 50%; object-fit: cover;
  flex-shrink: 0; opacity: 0.5;
}
.brand-txt {
  font-family: "Bebas Neue", sans-serif;
  font-size: 11px;
  letter-spacing: .22em;
  color: rgba(255,255,255,.2);
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>
<body>

function build(d) {
  if (d.m) return '<span class="mile"><span class="mile-yr">' + d.y + '</span><span class="mile-txt">' + d.x + '</span></span><span class="dot"></span>';
  var cls = d.sf ? 'entry sf26' : 'entry';
  var inner = '<span class="yr-block"><span class="yr">' + d.y + '</span><span class="num">' + d.n + '</span></span>';
  inner += '<span class="info-block">';
  if (d.sf) inner += '<span class="sf26-badge">SF26</span>';
  inner += '<span class="city">' + d.city + '</span>';
  if (d.p) inner += '<span class="pres">' + d.p + '</span>';
  if (d.x) inner += '<span class="note">' + d.x + '</span>';
  inner += '</span>';
  return '<span class="' + cls + '">' + inner + '</span><span class="dot"></span>';
}
var t = document.getElementById("ticker");
var html = D.map(build).join("");
