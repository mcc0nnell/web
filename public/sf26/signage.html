<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>SF26 LIVE — Lobby Signage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0B1E3D; --navy-2:#10264D; --navy-3:#132D5D; --navy-4:#08162E;
  --gold:#F2A800; --gold-hi:#FFD166; --gold-soft:rgba(242,168,0,.12);
  --gold-line:rgba(242,168,0,.30);
  --white:#FFFFFF; --off:rgba(255,255,255,.85); --dim:rgba(255,255,255,.55);
  --faint:rgba(255,255,255,.10); --faint2:rgba(255,255,255,.06);
  --panel:rgba(255,255,255,.05);
  --panel-border:rgba(255,255,255,.09);
  --shadow:0 24px 72px rgba(0,0,0,.44);
  --radius:20px; --radius-sm:12px;
  --cor:#F2A800; --workshop:#3B82F6;
  --ceremony:#F59E0B; --social:#8B5CF6; --cobo:#EF4444;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:1920px; height:1080px;
  overflow:hidden;
  background:var(--navy-4);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* Background */
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(circle at 12% 8%, rgba(242,168,0,.09) 0%, transparent 28%),
    radial-gradient(circle at 88% 80%, rgba(16,38,77,.7) 0%, transparent 38%),
    radial-gradient(circle at 50% 50%, rgba(11,30,61,.4) 0%, transparent 60%),
    linear-gradient(180deg, var(--navy-4) 0%, var(--navy) 50%, var(--navy-4) 100%);
}
body::after {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: repeating-linear-gradient(
    132deg, transparent, transparent 80px,
    rgba(255,255,255,.013) 80px, rgba(255,255,255,.013) 81px
  );
}

/* ── LAYOUT SHELL ── */
.shell {
  position:relative; z-index:1;
  display:grid;
  grid-template-rows:80px 1fr 76px;
  width:1920px; height:1080px;
  overflow:hidden;
}

/* ── TOP RAIL ── */
.top-rail {
  background:var(--gold);
  display:grid;
  grid-template-columns:minmax(0,360px) minmax(0,1fr) minmax(0,360px);
  align-items:center;
  padding:0 32px;
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 32px rgba(0,0,0,.36);
}
.top-rail::after {
  content:""; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(90deg,rgba(255,255,255,.22),transparent 28%,transparent 72%,rgba(0,0,0,.08));
}
.rail-brand {
  display:flex; align-items:center; gap:16px; z-index:1;
}
.rail-logo {
  width:44px; height:44px; object-fit:cover; border-radius:50%;
  flex-shrink:0;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.28));
}
.rail-wordmark {
  font-family:'Bebas Neue',sans-serif; font-size:48px;
  letter-spacing:.10em; line-height:1; color:var(--navy);
}
.rail-tagline {
  font-size:13px; font-weight:800; letter-spacing:.20em;
  text-transform:uppercase; color:var(--navy); opacity:.70; z-index:1;
}
.rail-center-text {
  text-align:center; z-index:1;
  font-size:15px; font-weight:800; letter-spacing:.18em;
  text-transform:uppercase; color:var(--navy); opacity:.72;
  min-width:0;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.rail-clock-block {
  display:flex; align-items:center; justify-content:flex-end;
  gap:16px; z-index:1;
  min-width:0;
}
.rail-live-badge {
  display:flex; align-items:center; gap:8px;
  font-size:13px; font-weight:800; letter-spacing:.16em;
  text-transform:uppercase; color:var(--navy);
}
.live-dot {
  width:10px; height:10px; background:#166534; border-radius:50%;
  animation:pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }
.clock {
  font-family:'Bebas Neue',sans-serif; font-size:64px;
  letter-spacing:.06em; line-height:1; color:var(--navy);
}

/* ── CONTENT AREA ── */
.content {
  display:grid;
  grid-template-columns:minmax(0,340px) minmax(0,1fr) minmax(0,340px);
  gap:20px;
  padding:20px 28px;
  overflow:hidden;
}

/* ── COLUMN STYLES ── */
.col {
  display:flex; flex-direction:column; gap:14px; overflow:hidden;
  min-width:0;
}
.col-label {
  font-size:11px; font-weight:800; letter-spacing:.22em;
  text-transform:uppercase; color:var(--dim);
  flex-shrink:0;
}

/* ── PANEL (glass card) ── */
.panel {
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  overflow:hidden;
  position:relative;
  box-shadow:var(--shadow);
}
.panel::before {
  content:""; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 50%);
}

/* ── LEFT COLUMN: NOW IN ROOMS ── */
.left-col { gap:10px; }
.left-col .col-label { margin-bottom:2px; }

.room-row {
  background:var(--panel); border:1px solid var(--panel-border);
  border-radius:var(--radius-sm); padding:14px 16px;
  position:relative; overflow:hidden; flex-shrink:0;
}
.room-row.active {
  background:rgba(242,168,0,.09);
  border-color:var(--gold-line);
}
.room-row.active::before {
  content:""; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--gold);
}
.rr-room {
  font-size:11px; font-weight:800; letter-spacing:.16em;
  text-transform:uppercase; color:var(--dim); margin-bottom:5px;
}
.rr-room.active { color:var(--gold); }
.rr-title {
  font-family:'Bebas Neue',sans-serif; font-size:26px;
  letter-spacing:.05em; line-height:1.05; color:var(--white);
  max-width:100%;
  overflow-wrap:anywhere;
}
.rr-time {
  font-size:13px; font-weight:700; color:var(--dim); margin-top:5px;
}
.rr-track {
  display:inline-block; font-size:10px; font-weight:800;
  letter-spacing:.12em; text-transform:uppercase;
  padding:2px 8px; border-radius:100px; margin-top:6px;
}

/* ── CENTER: NOW SPOTLIGHT ── */
.center-col { gap:0; }

.now-spotlight {
  flex:1; display:flex; flex-direction:column;
  background:var(--panel); border:1px solid var(--panel-border);
  border-radius:var(--radius); overflow:hidden; position:relative;
  box-shadow:var(--shadow);
}
.now-spotlight::before {
  content:""; position:absolute; top:0; left:0; right:0;
  height:4px; background:var(--gold);
  box-shadow:0 0 32px rgba(242,168,0,.6);
}
.ns-inner {
  flex:1; display:flex; flex-direction:column;
  padding:36px 40px 32px;
  background:linear-gradient(180deg,rgba(242,168,0,.06) 0%,transparent 40%);
}
.ns-label {
  font-size:13px; font-weight:800; letter-spacing:.28em;
  text-transform:uppercase; color:var(--gold); margin-bottom:16px;
  display:flex; align-items:center; gap:10px;
}
.ns-label::after {
  content:""; flex:1; height:1px; background:var(--gold-line);
}
.ns-track-tag {
  display:inline-block; font-size:12px; font-weight:800;
  letter-spacing:.14em; text-transform:uppercase;
  padding:4px 14px; border-radius:100px; margin-bottom:20px;
  flex-shrink:0; align-self:flex-start;
}
.ns-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:96px; line-height:.95; letter-spacing:.04em;
  color:var(--white); flex:1;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  overflow:hidden;
  max-width:100%;
  overflow-wrap:anywhere;
}
.ns-room-row {
  display:flex; align-items:center; gap:12px;
  margin-top:24px; padding-top:20px;
  border-top:1px solid var(--faint);
  min-width:0;
}
.ns-room-icon {
  width:40px; height:40px; border-radius:10px;
  background:var(--gold-soft); border:1px solid var(--gold-line);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.ns-room-name {
  font-family:'Bebas Neue',sans-serif; font-size:32px;
  letter-spacing:.06em; color:var(--off);
  max-width:100%;
  overflow-wrap:anywhere;
}
.ns-room-floor {
  font-size:14px; color:var(--dim); margin-top:2px;
  max-width:100%;
  overflow-wrap:anywhere;
}
.ns-time {
  margin-left:auto; text-align:right; flex-shrink:0;
}
.ns-time-val {
  font-family:'Bebas Neue',sans-serif; font-size:34px;
  letter-spacing:.06em; color:var(--gold-hi);
}
.ns-time-lbl {
  font-size:12px; font-weight:800; letter-spacing:.14em;
  text-transform:uppercase; color:var(--dim); margin-top:2px;
}

/* Progress bar below spotlight */
.spotlight-progress {
  height:4px; background:rgba(255,255,255,.08); overflow:hidden; flex-shrink:0;
}
.spotlight-progress-fill {
  height:100%; background:var(--gold);
  box-shadow:0 0 12px rgba(242,168,0,.5);
  transition:width 1s linear;
}

/* Transition overlay */
.ns-rotate-count {
  position:absolute; bottom:16px; right:20px;
  font-size:11px; font-weight:800; letter-spacing:.16em;
  text-transform:uppercase; color:var(--dim); opacity:.5;
}

/* ── RIGHT COLUMN: COMING UP ── */
.right-col { gap:10px; }

.upcoming-card {
  background:var(--panel); border:1px solid var(--panel-border);
  border-radius:var(--radius-sm); padding:14px 16px;
  flex-shrink:0; position:relative; overflow:hidden;
}
.upcoming-card.first {
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.14);
}
.uc-order {
  font-size:10px; font-weight:800; letter-spacing:.18em;
  text-transform:uppercase; color:var(--dim); margin-bottom:5px;
}
.uc-title {
  font-family:'Bebas Neue',sans-serif; font-size:28px;
  letter-spacing:.04em; line-height:1.05; color:var(--white);
  margin-bottom:5px;
  max-width:100%;
  overflow-wrap:anywhere;
}
.uc-meta {
  font-size:13px; color:var(--dim); font-weight:500;
  max-width:100%;
  overflow-wrap:anywhere;
}
.uc-room { color:var(--off); }
.uc-track {
  display:inline-block; font-size:10px; font-weight:800;
  letter-spacing:.12em; text-transform:uppercase;
  padding:2px 8px; border-radius:100px; margin-top:6px;
}

/* ── BOTTOM SPONSOR STRIP ── */
.sponsor-strip {
  display:flex; align-items:center; gap:0;
  padding:0 28px;
  background:rgba(8,16,36,.9);
  border-top:1px solid var(--faint);
  overflow:hidden;
}
.sponsor-label {
  font-size:11px; font-weight:800; letter-spacing:.22em;
  text-transform:uppercase; color:var(--dim); flex-shrink:0;
  padding-right:28px; border-right:1px solid var(--faint);
  margin-right:28px; white-space:nowrap;
}
.sponsor-logos {
  display:flex; align-items:center; gap:24px; flex:1;
  min-width:0;
  overflow:hidden;
}
.sponsor-logo-slot {
  height:44px; width:120px;
  background:rgba(255,255,255,.04); border:1px solid var(--faint);
  border-radius:8px; display:flex; align-items:center;
  justify-content:center; flex-shrink:0;
  font-size:11px; font-weight:800; letter-spacing:.12em;
  text-transform:uppercase; color:var(--dim);
}
.sponsor-tagline {
  margin-left:auto; font-size:12px; color:var(--dim);
  font-weight:500; letter-spacing:.06em; text-align:right;
  min-width:0;
  max-width:280px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* ── TRACK COLORS ── */
.tc-cor   { background:rgba(242,168,0,.15);  color:#F2A800; }
.tc-workshop { background:rgba(59,130,246,.15); color:#93C5FD; }
.tc-ceremony { background:rgba(245,158,11,.15); color:#FCD34D; }
.tc-social   { background:rgba(139,92,246,.15); color:#C4B5FD; }
.tc-cobo     { background:rgba(239,68,68,.15);  color:#FCA5A5; }

/* ── FADE TRANSITION ── */
.fade-out { animation:fadeOut .4s ease forwards; }
.fade-in  { animation:fadeIn .4s ease forwards; }
@keyframes fadeOut { to { opacity:0; transform:translateY(8px); } }
@keyframes fadeIn  { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce) {
  .live-dot { animation:none; opacity:1; }
  .fade-out,.fade-in { animation:none; }
  * { transition:none!important; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- TOP RAIL -->
  <header class="top-rail" role="banner">
    <div class="rail-brand">
      <img class="rail-logo" src="assets/nad-logo.png" alt="NAD logo">
      <div class="rail-wordmark">SF26 LIVE</div>
    </div>
    <div class="rail-center-text">
      National Association of the Deaf &nbsp;·&nbsp; 58th Biennial Conference &nbsp;·&nbsp; San Francisco, CA &nbsp;·&nbsp; 2026
    </div>
    <div class="rail-clock-block">
      <div class="rail-live-badge">
        <div class="live-dot" aria-hidden="true"></div>
        LIVE
      </div>
      <div class="clock" id="clock" role="timer" aria-live="off">12:00 PM</div>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="content">

    <!-- LEFT: NOW IN ROOMS -->
    <div class="col left-col">
      <div class="col-label">Now in progress</div>
      <div id="left-panel"></div>
    </div>

    <!-- CENTER: SPOTLIGHT -->
    <div class="col center-col">
      <div class="now-spotlight" id="spotlight" role="region" aria-label="Featured session">
        <div class="ns-inner" id="spotlight-inner"></div>
        <div class="spotlight-progress">
          <div class="spotlight-progress-fill" id="spotlight-prog" style="width:0%"></div>
        </div>
        <div class="ns-rotate-count" id="rotate-count"></div>
      </div>
    </div>

    <!-- RIGHT: COMING UP -->
    <div class="col right-col">
      <div class="col-label">Coming up next</div>
      <div id="right-panel"></div>
    </div>

  </div>

  <!-- SPONSOR STRIP -->
  <footer class="sponsor-strip" role="contentinfo">
    <div class="sponsor-label">With thanks to our sponsors</div>
    <div class="sponsor-logos">
      <div class="sponsor-logo-slot">Sponsor</div>
      <div class="sponsor-logo-slot">Sponsor</div>
      <div class="sponsor-logo-slot">Sponsor</div>
      <div class="sponsor-logo-slot">Sponsor</div>
      <div class="sponsor-logo-slot">Sponsor</div>
    </div>
    <div class="sponsor-tagline">sf26.live &nbsp;·&nbsp; NAD 58th Biennial Conference</div>
  </footer>

</div>
<script>
// ─────────────────────────────────────────
// DATA (Day 1 + Day 2 subset for demo)
// ─────────────────────────────────────────
const SESSIONS = [
  { id:"s101",s:"07:30",e:"09:00",title:"Registration & Badge Pickup",
    room:"Grand Ballroom Foyer",floor:"Lobby Level",track:"social",
    desc:"Morning registration, badge pickup, and conference materials." },
  { id:"s102",s:"09:00",e:"17:00",title:"Council of Representatives — Day 1",
    room:"Grand Ballroom B",floor:"Lobby Level — Tower",track:"cor",
    desc:"The NAD Council of Representatives convenes. Credentials, President's report, and resolutions business." },
  { id:"s103",s:"10:00",e:"11:30",title:"ASL Linguistics & Language Policy in 2026",
    room:"Continental 3–4",floor:"Lower Lobby Level",track:"workshop",
    desc:"ASL recognition, language policy, and recent federal changes affecting the Deaf community." },
  { id:"s104",s:"13:00",e:"14:30",title:"Technology Access & Deaf Innovation",
    room:"Continental 7–8",floor:"Lower Lobby Level",track:"workshop",
    desc:"AI captioning, real-time translation, and smart devices reshaping Deaf access." },
  { id:"s105",s:"13:00",e:"14:30",title:"Youth Leadership Development",
    room:"Continental 5–6",floor:"Lower Lobby Level",track:"workshop",
    desc:"Leadership pathways, civic engagement, college and career for Deaf youth ages 16–25." },
  { id:"s106",s:"15:00",e:"16:30",title:"Legal Rights & Advocacy in 2026",
    room:"Continental 3–4",floor:"Lower Lobby Level",track:"workshop",
    desc:"ADA rights, Section 504, and recent litigation shaping Deaf access rights." },
  { id:"s107",s:"15:00",e:"16:30",title:"Deaf Educators Roundtable",
    room:"Continental 1–2",floor:"Lower Lobby Level",track:"workshop",
    desc:"Open forum for Deaf educators at all levels sharing challenges and strategies." },
  { id:"s108",s:"19:00",e:"21:30",title:"Opening Ceremony",
    room:"Grand Ballroom B",floor:"Lobby Level — Tower",track:"ceremony",
    desc:"Formal opening of the NAD 58th Biennial Conference. Doors open at 6:30 PM." },
  { id:"s201",s:"09:00",e:"17:00",title:"Council of Representatives — Day 2",
    room:"Grand Ballroom B",floor:"Lobby Level — Tower",track:"cor",
    desc:"Committee reports, resolution debate, constitutional amendments, affiliate reports." },
  { id:"s202",s:"10:00",e:"11:30",title:"Mental Health & Deaf Community Wellness",
    room:"Continental 1–2",floor:"Lower Lobby Level",track:"workshop",
    desc:"Culturally affirming mental health approaches for the Deaf community." },
  { id:"s203",s:"10:00",e:"11:30",title:"Deaf Education Policy & Reform",
    room:"Continental 5–6",floor:"Lower Lobby Level",track:"workshop",
    desc:"School placement trends, bilingual-bicultural funding, IDEA implementation." },
  { id:"s204",s:"13:00",e:"14:30",title:"Employment & Workplace Inclusion",
    room:"Continental 3–4",floor:"Lower Lobby Level",track:"workshop",
    desc:"Accommodations, hybrid work access, and building genuinely inclusive teams." },
  { id:"s207",s:"19:00",e:"21:00",title:"Roots & Rising Cultural Extravaganza",
    room:"Grand Ballroom B",floor:"Lobby Level — Tower",track:"ceremony",
    desc:"An evening celebrating Deaf culture, heritage, and artistic expression." },
  { id:"s307",s:"19:00",e:"22:00",title:"College Bowl Finals",
    room:"Grand Ballroom B",floor:"Lobby Level — Tower",track:"cobo",
    desc:"Teams from Deaf and mainstream universities compete in academic quiz format." },
  { id:"s405",s:"16:30",e:"23:00",title:"Closing Celebration",
    room:"Grand Ballroom B",floor:"Lobby Level — Tower",track:"ceremony",
    desc:"Dinner, awards, farewell from NAD leadership. Formal attire encouraged." },
];

const TRACK_LABELS = {
  cor:"COR", workshop:"Workshop", ceremony:"Ceremony", social:"Social", cobo:"CoBo"
};
const ROOM_ICONS = {
  "Grand Ballroom B":"🎪",
  "Grand Ballroom Foyer":"🏛",
  "Continental 1–2":"🗂", "Continental 3–4":"🗂",
  "Continental 5–6":"🗂", "Continental 7–8":"🗂",
  "Continental 9–10":"🗂",
};

// ─────────────────────────────────────────
// DEMO TIME ENGINE
// Demo starts at 9:00 AM and advances 20min every 8 seconds
// Loops through the day
// ─────────────────────────────────────────
let demoMins = 9 * 60; // start at 9:00 AM
const DEMO_STEP = 20;   // minutes per tick
const TICK_MS = 8000;   // ms per tick

let spotlightIdx = 0;   // index into current sessions for center rotation
let rotateTimer = null;
let currentNow = [];

function toMins(t){ const[h,m]=t.split(':').map(Number); return h*60+m; }

function fmt12(mins){
  const h=Math.floor(mins/60)%24;
  const m=mins%60;
  const p=h>=12?'PM':'AM';
  const hh=h>12?h-12:(h===0?12:h);
  return `${hh}:${m.toString().padStart(2,'0')} ${p}`;
}

function fmt12s(t){ return fmt12(toMins(t)); }

// ─────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────
function updateClock(){
  const n=new Date();
  let h=n.getHours(),m=n.getMinutes();
  const p=h>=12?'PM':'AM';
  if(h>12)h-=12; if(h===0)h=12;
  document.getElementById('clock').textContent=`${h}:${m.toString().padStart(2,'0')} ${p}`;
}
setInterval(updateClock,1000);
updateClock();

// ─────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────
function trackClass(t){ return `tc-${t}`; }

function renderSpotlight(session, nowList, nextList){
  const inner=document.getElementById('spotlight-inner');
  if(!session){
    inner.innerHTML=`<div class="ns-label">Now</div>
      <div class="ns-title" style="color:var(--dim);font-size:64px">No sessions currently in progress</div>`;
    document.getElementById('spotlight-prog').style.width='0%';
    return;
  }

  const st=toMins(session.s), en=toMins(session.e);
  const prog=Math.min(100,Math.round(((demoMins-st)/(en-st))*100));
  const left=en-demoMins;

  inner.innerHTML=`
    <div class="ns-label">Now — ${fmt12(demoMins)} &nbsp;<span style="font-size:11px;opacity:.6">(demo)</span></div>
    <div class="ns-track-tag ${trackClass(session.track)}">${TRACK_LABELS[session.track]||session.track}</div>
    <div class="ns-title">${session.title}</div>
    <div class="ns-room-row">
      <div class="ns-room-icon" aria-hidden="true">${ROOM_ICONS[session.room]||'📋'}</div>
      <div>
        <div class="ns-room-name">${session.room}</div>
        <div class="ns-room-floor">${session.floor}</div>
      </div>
      <div class="ns-time">
        <div class="ns-time-val">${fmt12s(session.s)}</div>
        <div class="ns-time-lbl">through ${fmt12s(session.e)}</div>
      </div>
    </div>`;

  document.getElementById('spotlight-prog').style.width=prog+'%';

  // Rotation count
  if(nowList.length>1){
    document.getElementById('rotate-count').textContent=
      `${spotlightIdx+1} / ${nowList.length}`;
  } else {
    document.getElementById('rotate-count').textContent='';
  }
}

function renderLeft(nowList){
  const el=document.getElementById('left-panel');
  if(!nowList.length){
    el.innerHTML=`<div class="room-row"><div class="rr-room">No sessions in progress</div></div>`;
    return;
  }
  el.innerHTML=nowList.map((s,i)=>`
    <div class="room-row${i===spotlightIdx?' active':''}">
      <div class="rr-room${i===spotlightIdx?' active':''}">
        ${ROOM_ICONS[s.room]||'📋'} ${s.room}
      </div>
      <div class="rr-title">${s.title}</div>
      <div class="rr-time">${fmt12s(s.s)} – ${fmt12s(s.e)}</div>
      <div class="rr-track ${trackClass(s.track)}">${TRACK_LABELS[s.track]||s.track}</div>
    </div>`).join('');
}

function renderRight(nextList){
  const el=document.getElementById('right-panel');
  const labels=['Up next','Then','Later','After that'];
  if(!nextList.length){
    el.innerHTML=`<div class="upcoming-card"><div class="uc-order">No upcoming sessions</div></div>`;
    return;
  }
  el.innerHTML=nextList.slice(0,4).map((s,i)=>`
    <div class="upcoming-card${i===0?' first':''}">
      <div class="uc-order">${labels[i]||'Later'}</div>
      <div class="uc-title">${s.title}</div>
      <div class="uc-meta">
        <span class="uc-room">${s.room}</span> &nbsp;·&nbsp; ${fmt12s(s.s)}
      </div>
      <div class="uc-track ${trackClass(s.track)}">${TRACK_LABELS[s.track]||s.track}</div>
    </div>`).join('');
}

// ─────────────────────────────────────────
// MAIN UPDATE CYCLE
// ─────────────────────────────────────────
function update(){
  const nowSessions = SESSIONS.filter(s=>
    demoMins>=toMins(s.s) && demoMins<toMins(s.e)
  );
  const nextSessions = SESSIONS.filter(s=>
    demoMins<toMins(s.s)
  ).sort((a,b)=>toMins(a.s)-toMins(b.s));

  // Deduplicate next (by time then room)
  const seen=new Set();
  const nextUniq=nextSessions.filter(s=>{
    const k=s.s+'|'+s.room;
    if(seen.has(k)) return false;
    seen.add(k); return true;
  });

  currentNow=nowSessions;
  if(spotlightIdx>=nowSessions.length) spotlightIdx=0;

  renderLeft(nowSessions);
  renderSpotlight(nowSessions[spotlightIdx]||null, nowSessions, nextUniq);
  renderRight(nextUniq);
}

// Spotlight rotation among concurrent sessions
function rotateSpotlight(){
  if(currentNow.length>1){
    spotlightIdx=(spotlightIdx+1)%currentNow.length;
    renderLeft(currentNow);
    renderSpotlight(currentNow[spotlightIdx], currentNow, []);
  }
}

// Demo time advance
function tick(){
  demoMins+=DEMO_STEP;
  // Loop back after 11:30 PM
  if(demoMins>=23*60+30) demoMins=7*60+30;
  spotlightIdx=0;
  update();
}

// Start
update();
setInterval(tick, TICK_MS);
setInterval(rotateSpotlight, TICK_MS/2); // rotate spotlight twice as fast
</script>
